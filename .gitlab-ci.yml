# CloudNotes — GitLab CI/CD Pipeline
#
# Stages:
#   test   → pytest suite + SAST + secret detection + trivy dependency scan
#   build  → Docker images pushed to GitLab Container Registry (main only)
#   deploy → placeholder rolling deploy (manual gate, main only)
#
# Built-in GitLab variables used:
#   CI_REGISTRY              → registry.gitlab.com
#   CI_REGISTRY_IMAGE        → registry.gitlab.com/<namespace>/cloudnotes
#   CI_REGISTRY_USER/TOKEN   → auto-injected by GitLab for registry auth
#   CI_COMMIT_SHA            → full commit hash used as image tag
#   CI_COMMIT_REF_SLUG       → branch name, URL-safe (e.g. "main")
#
# Security scanning tier notes:
#   SAST + Secret Detection → available on ALL GitLab tiers (Free included)
#   Dependency Scanning     → GitLab Ultimate only; trivy job below is the free alternative
#   Security results appear in: Security → Vulnerability Report (MR widget on Ultimate)

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - test
  - build
  - deploy

# ── Global defaults ────────────────────────────────────────────────────────────
default:
  interruptible: true

# ── Security scanner variables ──────────────────────────────────────────────────
variables:
  SAST_EXCLUDED_PATHS: "spec,test,tests,tmp,.venv,node_modules,frontend/dist"
  SECRET_DETECTION_EXCLUDED_PATHS: ".venv,node_modules,frontend/dist"

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 1 — TEST
# Runs: pytest + trivy CVE scan
# ══════════════════════════════════════════════════════════════════════════════

test:backend:
  stage: test
  image: python:3.11-slim

  # GitLab services run as sibling containers reachable at the alias hostname.
  services:
    - name: postgres:16-alpine
      alias: postgres

  variables:
    POSTGRES_DB: cloudnotes_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    TEST_DATABASE_URL: postgresql://postgres:postgres@postgres/cloudnotes_test
    DATABASE_URL: postgresql://postgres:postgres@postgres/cloudnotes_test
    SECRET_KEY: ci-test-secret-only
    APP_ENV: test
    REDIS_URL: "memory://"

  cache:
    key:
      files:
        - backend/requirements.txt
        - backend/requirements-dev.txt
    paths:
      - .pip-cache/
    policy: pull-push

  before_script:
    - pip install --cache-dir .pip-cache -r backend/requirements.txt -r backend/requirements-dev.txt
    - python -c "import tzlocal; print('tzlocal after install:', tzlocal.__file__)"
    - pip show tzlocal
    - pip show apscheduler | grep -E "Version|Requires"

  script:
    - python -c "import tzlocal; print('tzlocal in script:', tzlocal.__file__)"
    - cd backend && python -m pytest tests/ -q --tb=short --junitxml=../test-results.xml

  artifacts:
    when: always
    reports:
      junit: test-results.xml
    expire_in: 7 days

  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH


dependency-scan:trivy:
  stage: test
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy fs --exit-code 0 --severity HIGH,CRITICAL --format table backend/requirements.txt
    - trivy fs --exit-code 0 --severity HIGH,CRITICAL --format table frontend/package.json
    - trivy fs --exit-code 0 --severity HIGH,CRITICAL --format json --output trivy-report.json .
  artifacts:
    when: always
    paths:
      - trivy-report.json
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH


# ══════════════════════════════════════════════════════════════════════════════
# STAGE 2 — BUILD
# Only runs on main after all test/scan jobs pass.
# Pushes images with two tags:
#   :latest       → always points to the most recent main build
#   :<commit-sha> → immutable tag used by deploy for exact rollback
# ══════════════════════════════════════════════════════════════════════════════

.build-base: &build-base
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  rules:
    - if: $CI_COMMIT_BRANCH == "main"


build:backend:
  <<: *build-base
  script:
    - |
      docker build \
        -t $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA \
        -t $CI_REGISTRY_IMAGE/backend:latest \
        ./backend
    - docker push $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/backend:latest


build:frontend:
  <<: *build-base
  script:
    - |
      docker build \
        --build-arg APP_ENV=production \
        -t $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA \
        -t $CI_REGISTRY_IMAGE/frontend:latest \
        -f frontend/Dockerfile .
    - docker push $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/frontend:latest


# ══════════════════════════════════════════════════════════════════════════════
# STAGE 3 — DEPLOY  (placeholder — wire up to your target)
#
# Options:
#   A. SSH into a VPS:  docker compose pull && docker compose up -d
#   B. AWS ECS:         aws ecs update-service --force-new-deployment
#   C. Kubernetes:      kubectl set image deployment/...
#   D. Render / Fly.io CLI deploy command
#
# Add credentials as masked CI/CD variables:
#   GitLab → Project → Settings → CI/CD → Variables
# ══════════════════════════════════════════════════════════════════════════════

deploy:production:
  stage: deploy
  image: alpine:3.20
  needs:
    - build:backend
    - build:frontend
  variables:
    IMAGE_TAG: $CI_COMMIT_SHA
  script:
    - echo "Deploy backend  → $CI_REGISTRY_IMAGE/backend:$IMAGE_TAG"
    - echo "Deploy frontend → $CI_REGISTRY_IMAGE/frontend:$IMAGE_TAG"
    - echo "Wire up your deploy command here (SSH / ECS / kubectl / Fly.io)"
  environment:
    name: production
    url: https://your-app-url.com
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
