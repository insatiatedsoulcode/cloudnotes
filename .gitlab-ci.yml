# CloudNotes — GitLab CI/CD Pipeline
#
# Stages:
#   test   → run the full pytest suite against a real Postgres
#   scan   → SAST, secret detection, dependency scanning
#   build  → build Docker images, push to GitLab Container Registry
#   deploy → (placeholder) rolling deploy to your target environment
#
# Built-in GitLab variables used:
#   CI_REGISTRY              → registry.gitlab.com
#   CI_REGISTRY_IMAGE        → registry.gitlab.com/<namespace>/cloudnotes
#   CI_REGISTRY_USER/TOKEN   → auto-injected by GitLab for registry auth
#   CI_COMMIT_SHA            → full commit hash used as image tag
#   CI_COMMIT_REF_SLUG       → branch name, URL-safe (e.g. "main")
#
# Security scanning tier notes:
#   SAST + Secret Detection → available on ALL tiers (Free / Premium / Ultimate)
#   Dependency Scanning     → requires GitLab Ultimate
#   Results appear in: Security → Vulnerability Report (MR security widget on Ultimate)

# ── GitLab managed security templates ──────────────────────────────────────────
# GitLab injects pre-built analyzer jobs (semgrep for SAST, trufflehog for secrets).
# No extra tools to install — the templates bring their own Docker images.
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - test
  - scan
  - build
  - deploy

# ── Global defaults ────────────────────────────────────────────────────────────
default:
  interruptible: true     # newer pipeline cancels the previous one on the same branch

# ── Pipeline rules ─────────────────────────────────────────────────────────────
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ── Security scanner configuration ─────────────────────────────────────────────
variables:
  # Semgrep SAST: skip vendored/generated code
  SAST_EXCLUDED_PATHS: "spec,test,tests,tmp,.venv,node_modules,frontend/dist"
  # Secret Detection: skip lock files and compiled output that contain false positives
  SECRET_DETECTION_EXCLUDED_PATHS: ".venv,node_modules,frontend/dist,backend/requirements.txt"

# Override the stage that the included templates inject their jobs into.
# Both SAST and Secret Detection default to "test"; move them to "scan"
# so they run after the pytest job and don't compete for the same runner slot.
semgrep-sast:
  stage: scan

secret_detection:
  stage: scan


# ══════════════════════════════════════════════════════════════════════════════
# STAGE 1 — TEST
# ══════════════════════════════════════════════════════════════════════════════

test:backend:
  stage: test
  image: python:3.11-slim

  # GitLab services run as sibling containers.
  # The service is reachable inside the job at the hostname "postgres".
  services:
    - name: postgres:16-alpine
      alias: postgres

  variables:
    # Postgres service config
    POSTGRES_DB: cloudnotes_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres

    # What conftest.py reads to build the SQLAlchemy engine
    TEST_DATABASE_URL: postgresql://postgres:postgres@postgres/cloudnotes_test

    # App settings — must be set before any app module is imported
    DATABASE_URL: postgresql://postgres:postgres@postgres/cloudnotes_test
    SECRET_KEY: ci-test-secret-only
    APP_ENV: test
    # slowapi uses in-memory store in test mode; fakeredis mocks the cache layer
    REDIS_URL: "memory://"

  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .pip-cache/
    policy: pull-push

  before_script:
    - pip install --cache-dir .pip-cache -r backend/requirements.txt
    - pip install --cache-dir .pip-cache -r backend/requirements-dev.txt

  script:
    - cd backend
    - python -m pytest tests/ -q --tb=short
      --junitxml=../test-results.xml

  artifacts:
    when: always
    reports:
      junit: test-results.xml   # shows pass/fail per test in the MR widget
    expire_in: 7 days

  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH


# ══════════════════════════════════════════════════════════════════════════════
# STAGE 2 — SCAN
# SAST (semgrep) and Secret Detection jobs are injected here by the includes above.
# The trivy job below is a free alternative to GitLab's Ultimate-only Dependency
# Scanning — it scans requirements.txt and package.json for known CVEs.
# ══════════════════════════════════════════════════════════════════════════════

dependency-scan:trivy:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    # Scan Python dependencies
    - trivy fs --exit-code 0 --severity HIGH,CRITICAL
        --format table backend/requirements.txt
    # Scan Node dependencies
    - trivy fs --exit-code 0 --severity HIGH,CRITICAL
        --format table frontend/package.json
    # Write a JSON report as an artifact (viewable in the pipeline)
    - trivy fs --exit-code 0 --severity HIGH,CRITICAL
        --format json --output trivy-report.json .
  artifacts:
    when: always
    paths:
      - trivy-report.json
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH


# ══════════════════════════════════════════════════════════════════════════════
# STAGE 3 — BUILD
# Only runs on main after tests + scans pass.
# Pushes images to GitLab Container Registry with two tags:
#   :latest          → always points to the most recent main build
#   :<commit-sha>    → immutable, used by deploy stage for exact rollback
# ══════════════════════════════════════════════════════════════════════════════

.build-base: &build-base
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  rules:
    - if: $CI_COMMIT_BRANCH == "main"


build:backend:
  <<: *build-base
  script:
    - |
      docker build \
        -t $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA \
        -t $CI_REGISTRY_IMAGE/backend:latest \
        ./backend
    - docker push $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/backend:latest


build:frontend:
  <<: *build-base
  script:
    - |
      docker build \
        --build-arg APP_ENV=production \
        -t $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA \
        -t $CI_REGISTRY_IMAGE/frontend:latest \
        -f frontend/Dockerfile .
    - docker push $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/frontend:latest


# ══════════════════════════════════════════════════════════════════════════════
# STAGE 4 — DEPLOY  (placeholder — wire up to your target)
#
# Options:
#   A. SSH into a VPS and run docker compose pull && docker compose up -d
#   B. aws ecs update-service --force-new-deployment  (ECS rolling deploy)
#   C. kubectl set image deployment/...              (Kubernetes)
#   D. Render / Railway / Fly.io CLI deploy command
#
# Add the required credentials as masked CI/CD variables in:
#   GitLab → Project → Settings → CI/CD → Variables
# ══════════════════════════════════════════════════════════════════════════════

deploy:production:
  stage: deploy
  image: alpine:3.20
  needs:
    - build:backend
    - build:frontend
  variables:
    IMAGE_TAG: $CI_COMMIT_SHA
  script:
    - echo "Deploy backend  → $CI_REGISTRY_IMAGE/backend:$IMAGE_TAG"
    - echo "Deploy frontend → $CI_REGISTRY_IMAGE/frontend:$IMAGE_TAG"
    - echo "Wire up your deploy command here (SSH / ECS / kubectl / Fly.io)"
  environment:
    name: production
    url: https://your-app-url.com    # update this
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual    # requires a human to click Deploy in the GitLab UI
