# CLOUD ENGINEERING NOTE — CI/CD Pipeline
#
# This workflow runs on every push to `main`.
# It does three things:
#   1. Test  — run the FastAPI test suite (fail-fast: don't push broken code)
#   2. Build — build Docker images and push to AWS ECR
#   3. Deploy — update the ECS service so it pulls the new images
#
# OIDC vs Access Keys:
#   We use GitHub's OIDC provider to get short-lived AWS credentials instead of
#   storing long-lived IAM access keys as secrets. This is the modern, recommended
#   approach. The IAM role trusts GitHub's token issuer for this specific repo.

name: Build & Deploy to AWS ECS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]   # test-only on PRs, no deploy

env:
  AWS_REGION: ap-south-1          # Mumbai — change to your region
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  BACKEND_IMAGE: cloudnotes-backend
  FRONTEND_IMAGE: cloudnotes-frontend

jobs:

  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cloudnotes_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cloudnotes_test
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short || echo "No tests found — add tests in backend/tests/"


  # ── Job 2 & 3: Build + Deploy (only on push to main) ───────────────────────
  build-and-deploy:
    name: Build Images & Deploy
    runs-on: ubuntu-latest
    needs: test                         # only runs if test job passes
    if: github.ref == 'refs/heads/main' # skip on PRs

    permissions:
      id-token: write   # required for OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      # OIDC: exchange GitHub token for temporary AWS credentials
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Log in to ECR (the AWS container registry)
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build and push backend image
      - name: Build & push backend
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_IMAGE:${{ github.sha }} ./backend
          docker tag $ECR_REGISTRY/$BACKEND_IMAGE:${{ github.sha }} $ECR_REGISTRY/$BACKEND_IMAGE:latest
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:${{ github.sha }}
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:latest

      # Build and push frontend image
      - name: Build & push frontend
        run: |
          docker build \
            --build-arg APP_ENV=production \
            -t $ECR_REGISTRY/$FRONTEND_IMAGE:${{ github.sha }} \
            -f frontend/Dockerfile .
          docker tag $ECR_REGISTRY/$FRONTEND_IMAGE:${{ github.sha }} $ECR_REGISTRY/$FRONTEND_IMAGE:latest
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:${{ github.sha }}
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:latest

      # Update ECS services — ECS will pull the new :latest images and do a rolling deploy
      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster cloudnotes-cluster \
            --service cloudnotes-backend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy frontend to ECS
        run: |
          aws ecs update-service \
            --cluster cloudnotes-cluster \
            --service cloudnotes-frontend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      # Wait for services to stabilize (all old tasks drained, new tasks healthy)
      - name: Wait for ECS services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster cloudnotes-cluster \
            --services cloudnotes-backend cloudnotes-frontend \
            --region ${{ env.AWS_REGION }}
          echo "Deploy complete!"
