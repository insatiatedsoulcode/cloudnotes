# CLOUD ENGINEERING NOTE:
# docker-compose is for LOCAL development and testing only.
# In AWS, ECS task definitions replace this file.
# The concepts map directly:
#   compose service  →  ECS task definition
#   depends_on       →  ECS service ordering / health checks
#   volumes          →  EFS (Elastic File System) or ephemeral task storage
#   networks         →  VPC + security groups
#   environment      →  ECS task env vars or Secrets Manager references

version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: cloudnotes_db
    environment:
      POSTGRES_DB: cloudnotes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"     # 5433 on host so it doesn't clash with a local Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cloudnotes"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  # CLOUD EQUIVALENT: ElastiCache (Redis OSS)
  # Used for: cache-aside note list/detail, rate-limit counters
  redis:
    image: redis:7-alpine
    container_name: cloudnotes_redis
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"     # 6380 on host so it doesn't clash with a local Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudnotes_backend
    environment:
      # "db" and "redis" resolve via Docker's internal DNS (service names)
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cloudnotes
      REDIS_URL: redis://redis:6379

      # SECURITY: override SECRET_KEY in production via Secrets Manager / env injection
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}

      APP_ENV: local
      JWT_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 30

      # Skip email verification in local Docker (no SMTP server running)
      AUTO_VERIFY_EMAILS: "true"

      # Human-readable logs in local; switch to "json" for CloudWatch / Datadog
      LOG_FORMAT: text

      # SMTP — update if you add MailHog or SES
      SMTP_HOST: ""
      SMTP_PORT: "1025"
      EMAIL_FROM: noreply@cloudnotes.local
      APP_BASE_URL: http://localhost

      UPLOADS_DIR: /app/uploads
    volumes:
      # Named volume keeps uploaded files across container restarts.
      # CLOUD EQUIVALENT: EFS mount or S3 (swap StorageBackend to S3Storage)
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"     # direct access for curl / Postman / Swagger UI
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        # Sync code changes into the running container without a full rebuild.
        # Uvicorn --reload inside the container picks up the synced changes.
        # CLOUD EQUIVALENT: CodeDeploy in-place update or ECS rolling deploy
        - action: sync
          path: ./backend/app
          target: /app/app

  # ── React frontend (Nginx) ──────────────────────────────────────────────────
  # Build context is the project root so the Dockerfile can reach both
  # frontend/ (React source) and nginx/ (nginx.conf) in one context.
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        APP_ENV: local
    container_name: cloudnotes_frontend
    ports:
      - "80:80"         # access the full app at http://localhost
    depends_on:
      backend:
        condition: service_healthy


volumes:
  postgres_data:    # survives docker compose down / up
  redis_data:       # survives docker compose down / up
  uploads_data:     # uploaded file attachments
