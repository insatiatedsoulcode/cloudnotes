# CLOUD ENGINEERING NOTE:
# Nginx has two jobs here:
#   1. Serve the React build (static files) on port 80
#   2. Reverse-proxy /api/*, /uploads/*, and /health to the FastAPI container
#
# This is the classic BFF (Backend for Frontend) proxy pattern.
# In AWS, the ALB replaces this file — it routes /api/* to the backend
# target group and /* to the S3-hosted frontend or CloudFront distribution.

server {
    listen 80;
    server_name _;

    # Compress text responses — reduces bandwidth for JS bundles and JSON
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # React SPA — serve static files, fall back to index.html for client-side routes
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the FastAPI backend container.
    # In docker-compose, "backend" resolves via Docker's internal DNS.
    # CLOUD EQUIVALENT: ALB listener rule: path /api/* → backend target group
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy uploaded file requests to the backend's StaticFiles mount.
    # CLOUD EQUIVALENT: in production, swap for direct S3/CloudFront URLs
    # so binary traffic never passes through the app server.
    location /uploads/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Health check — proxied to FastAPI so a single probe verifies the full stack
    location /health {
        proxy_pass http://backend:8000/health;
    }
}
