# CLOUD ENGINEERING NOTE:
# Nginx has two jobs here:
#   1. Serve the React build (static files) on port 80
#   2. Reverse-proxy /api/* requests to the FastAPI backend container
#
# This is a classic "BFF" (Backend for Frontend) proxy pattern.
# In AWS, the ALB replaces this file — it routes /api/* to the backend
# target group and /* to the frontend target group.

server {
    listen 80;
    server_name _;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Serve React SPA
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service
    # In docker-compose, "backend" is the service name — Docker's internal DNS resolves it.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check for load balancers
    location /health {
        proxy_pass http://backend:8000/health;
    }
}
